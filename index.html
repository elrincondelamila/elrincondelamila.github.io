<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>El Rincón de la Mila</title>

<style>
body{
  margin:0;
  font-family: 'Segoe UI', sans-serif;
  background:#f4f4f4;
  color:#222;
}

header{
  background:white;
  text-align:center;
  padding:30px;
}

header img{
  max-width:250px;
}

section{
  padding:40px 20px;
  max-width:1100px;
  margin:auto;
}

.card{
  background:white;
  padding:30px;
  border-radius:20px;
  box-shadow:0 10px 30px rgba(0,0,0,0.08);
  margin-bottom:40px;
}

h2{text-align:center;margin-bottom:20px;}

.counter{
  font-size:32px;
  text-align:center;
  color:#d62828;
  font-weight:bold;
}

.products{
  display:grid;
  grid-template-columns: repeat(auto-fit, minmax(250px,1fr));
  gap:30px;
}

.product{
  background:white;
  padding:20px;
  border-radius:15px;
  box-shadow:0 10px 20px rgba(0,0,0,0.05);
  text-align:center;
}

.product img{
  width:100%;
  border-radius:15px;
  height:200px;
  object-fit:cover;
}

.reviews-container{
  overflow:hidden;
  position:relative;
}

.reviews{
  display:flex;
  gap:20px;
  transition:transform 0.5s ease;
}

.review{
  min-width:300px;
  background:#fafafa;
  padding:20px;
  border-radius:15px;
  box-shadow:0 5px 15px rgba(0,0,0,0.05);
}

.review img{
  width:50px;
  height:50px;
  border-radius:50%;
}

.stars{
  color:#ff9800;
}

form input, form textarea{
  width:100%;
  padding:10px;
  margin:10px 0;
  border-radius:10px;
  border:1px solid #ccc;
}

button{
  background:#d62828;
  color:white;
  border:none;
  padding:10px 20px;
  border-radius:8px;
  cursor:pointer;
}

button:hover{background:#9d0208;}

.remove-btn{
  background:black;
  padding:5px 10px;
  font-size:12px;
  margin-left:10px;
}

.whatsapp-float{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#25D366;
  width:65px;
  height:65px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:30px;
  text-decoration:none;
  color:white;
  box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

iframe{
  width:100%;
  height:350px;
  border:0;
  border-radius:20px;
}
</style>
</head>

<body>

<header>
<img src="BackgroundEraser_20260304_034450533.png">
<p>Milanesas artesanales premium</p>
</header>

<section>

<div class="card">
<h2>+ Clientes Satisfechos</h2>
<div class="counter" id="counter">0</div>
</div>

<!-- PRODUCTOS -->
<div class="card">
<h2>Nuestros Productos</h2>
<div class="products">
<div class="product">
<img src="Milanesapollo.jpeg">
<h3>Milanesa x 1kg</h3>
<p>$8.000</p>
<button onclick="addToCart('1kg',8000)">Agregar</button>
</div>

<div class="product">
<img src="Milanesapollo.jpeg">
<h3>Milanesa x 3kg</h3>
<p>$20.400</p>
<button onclick="addToCart('3kg',20400)">Agregar</button>
</div>
</div>
</div>

<!-- RESEÑAS CON CARRUSEL -->
<div class="card">
<h2>Opiniones de Clientes</h2>

<div class="reviews-container">
<div class="reviews" id="reviews"></div>
</div>

<h3>Dejá tu opinión</h3>
<form onsubmit="addReview(event)">
<input type="text" id="name" placeholder="Tu nombre" required>
<textarea id="comment" placeholder="Tu comentario" required></textarea>
<button type="submit">Publicar</button>
</form>

</div>

<!-- CARRITO -->
<div class="card">
<h2>Carrito</h2>
<ul id="cart-list"></ul>
<p><strong>Total: $<span id="total">0</span></strong></p>
<button onclick="sendWhatsApp()">Finalizar Compra</button>
</div>

<h2>Ubicación</h2>
<iframe src="https://www.google.com/maps?q=Miguel%20Cane%202575,%20Barranqueras,%20Chaco&output=embed"></iframe>

</section>

<a href="https://wa.me/543624505931" class="whatsapp-float">💬</a>

<script>

let cart=[];
let total=0;

/* ---- CARRITO ---- */

function addToCart(product,price){
  cart.push({name:product,price:price});
  total+=price;
  renderCart();
}

function removeItem(index){
  total-=cart[index].price;
  cart.splice(index,1);
  renderCart();
}

function renderCart(){
  let list=document.getElementById("cart-list");
  list.innerHTML="";
  cart.forEach((item,index)=>{
    let li=document.createElement("li");
    li.innerHTML=item.name+" - $"+item.price+
    " <button class='remove-btn' onclick='removeItem("+index+")'>❌</button>";
    list.appendChild(li);
  });
  document.getElementById("total").innerText=total;
}

function sendWhatsApp(){
  let message="Hola! Quiero comprar:%0A";
  cart.forEach(item=>{
    message+=item.name+" - $"+item.price+"%0A";
  });
  message+="%0ATotal: $"+total;
  window.open("https://wa.me/543624505931?text="+message);
}

/* ---- RESEÑAS ---- */

function loadReviews(){
  let reviews=JSON.parse(localStorage.getItem("reviews")) || [];
  let container=document.getElementById("reviews");
  container.innerHTML="";

  reviews.forEach(r=>{
    let div=document.createElement("div");
    div.className="review";
    div.innerHTML=`
      <img src="https://i.pravatar.cc/100">
      <h4>${r.name}</h4>
      <div class="stars">★★★★★</div>
      <p>${r.comment}</p>
    `;
    container.appendChild(div);
  });
}

function addReview(e){
  e.preventDefault();
  let name=document.getElementById("name").value;
  let comment=document.getElementById("comment").value;

  let reviews=JSON.parse(localStorage.getItem("reviews")) || [];
  reviews.push({name,comment});
  localStorage.setItem("reviews",JSON.stringify(reviews));

  document.getElementById("name").value="";
  document.getElementById("comment").value="";

  loadReviews();
}

/* ---- CARRUSEL AUTOMATICO ---- */

let scrollPosition=0;

function autoCarousel(){
  let container=document.querySelector(".reviews");
  if(container){
    scrollPosition += 320;
    if(scrollPosition >= container.scrollWidth){
      scrollPosition = 0;
    }
    container.style.transform="translateX(-"+scrollPosition+"px)";
  }
}

setInterval(autoCarousel,3000);

/* ---- CONTADOR ---- */

let count=0;
let target=500;
let counter=document.getElementById("counter");

let interval=setInterval(()=>{
  count+=5;
  counter.innerText="+"+count;
  if(count>=target){
    counter.innerText="+500";
    clearInterval(interval);
  }
},20);

loadReviews();

</script>

</body>
</html>
