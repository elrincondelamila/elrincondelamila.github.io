<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>El Rincón de la Mila</title>

<style>

body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:#f4f4f4;
color:#222;
transition:0.3s;
}

header{
background:white;
text-align:center;
padding:30px;
}

header img{
max-width:250px;
}

section{
padding:40px 20px;
max-width:1100px;
margin:auto;
}

.card{
background:white;
padding:30px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.08);
margin-bottom:40px;
}

h2{text-align:center}

.counter{
font-size:32px;
text-align:center;
color:#d62828;
font-weight:bold;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:30px;
}

.product{
background:white;
padding:20px;
border-radius:15px;
box-shadow:0 10px 20px rgba(0,0,0,0.05);
text-align:center;
position:relative;
}

.badge{
position:absolute;
top:10px;
left:10px;
background:#ff9800;
color:white;
padding:5px 10px;
border-radius:10px;
font-size:12px;
}

.product img{
width:100%;
border-radius:15px;
height:200px;
object-fit:cover;
}

.qty{
width:60px;
padding:5px;
margin-top:10px;
}

.reviews-container{
overflow:hidden;
}

.reviews{
display:flex;
gap:20px;
transition:transform 0.5s;
}

.review{
min-width:300px;
background:#fafafa;
padding:20px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,0.05);
}

.review img{
width:50px;
height:50px;
border-radius:50%;
}

.stars{
color:#ff9800;
}

form input,form textarea,form select{
width:100%;
padding:10px;
margin:10px 0;
border-radius:10px;
border:1px solid #ccc;
}

button{
background:#d62828;
color:white;
border:none;
padding:10px 20px;
border-radius:8px;
cursor:pointer;
}

button:hover{background:#9d0208;}

.remove-btn{
background:black;
padding:5px 10px;
font-size:12px;
margin-left:10px;
}

.whatsapp-float{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
width:65px;
height:65px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:30px;
text-decoration:none;
color:white;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

iframe{
width:100%;
height:350px;
border:0;
border-radius:20px;
}

/* DARK MODE */

body.dark{
background:#121212;
color:#f1f1f1;
}

body.dark header{background:#1e1e1e;}

body.dark .card{background:#1e1e1e;}

body.dark .product{background:#1e1e1e;}

body.dark .review{background:#2a2a2a;}

</style>
</head>

<body>

<header>
<img src="BackgroundEraser_20260304_034450533.png">
<p>Milanesas artesanales premium</p>
<button id="darkToggle">🌙 Modo Oscuro</button>
</header>

<section>

<div class="card">
<h2>+ Clientes Satisfechos</h2>
<div class="counter" id="counter">0</div>
</div>

<div class="card">
<h2>Nuestros Productos</h2>

<div class="products">

<div class="product">
<img src="Milanesapollo.jpeg">
<h3>Milanesa x 1kg</h3>
<p>$8.000</p>
<input type="number" value="1" min="1" class="qty" id="qty1">
<br><br>
<button onclick="addToCart('1kg',8000,'qty1')">Agregar</button>
</div>

<div class="product">
<div class="badge">🔥 Más vendido</div>
<img src="Milanesapollo.jpeg">
<h3>Milanesa x 3kg</h3>
<p>$18.000</p>
<input type="number" value="1" min="1" class="qty" id="qty2">
<br><br>
<button onclick="addToCart('3kg',18000,'qty2')">Agregar</button>
</div>

<div class="product">
<img src="Milanesapollo.jpeg">
<h3>Milanesa x 10kg</h3>
<p>$55.000</p>
<input type="number" value="1" min="1" class="qty" id="qty3">
<br><br>
<button onclick="addToCart('10kg',55000,'qty3')">Agregar</button>
</div>

<div class="product">
<img src="Milanesapollo.jpeg">
<h3>Milanesa x 25kg</h3>
<p>$120.000</p>
<input type="number" value="1" min="1" class="qty" id="qty4">
<br><br>
<button onclick="addToCart('25kg',120000,'qty4')">Agregar</button>
</div>

</div>
</div>

<div class="card">
<h2>Opiniones de Clientes</h2>

<div class="reviews-container">
<div class="reviews" id="reviews"></div>
</div>

<h3>Dejá tu opinión</h3>

<form onsubmit="addReview(event)">

<input type="text" id="name" placeholder="Tu nombre" required>

<select id="rating">
<option value="5">★★★★★</option>
<option value="4">★★★★</option>
<option value="3">★★★</option>
<option value="2">★★</option>
<option value="1">★</option>
</select>

<textarea id="comment" placeholder="Tu comentario" required></textarea>

<button type="submit">Publicar</button>

</form>

</div>

<div class="card">
<h2>Carrito</h2>

<ul id="cart-list"></ul>

<p><strong>Total: $<span id="total">0</span></strong></p>

<button onclick="sendWhatsApp()">Finalizar Compra</button>

</div>

<h2>Ubicación</h2>

<iframe src="https://www.google.com/maps?q=Miguel%20Cane%202575,%20Barranqueras,%20Chaco&output=embed"></iframe>

</section>

<a href="https://wa.me/543624505931" class="whatsapp-float">💬</a>

<script>

let cart=[];
let total=0;

function addToCart(product,price,qtyId){

let qty=document.getElementById(qtyId).value;

let subtotal=price*qty;

cart.push({name:product,price:price,qty:qty,subtotal:subtotal});

total+=subtotal;

renderCart();

}

function removeItem(index){

total-=cart[index].subtotal;

cart.splice(index,1);

renderCart();

}

function renderCart(){

let list=document.getElementById("cart-list");

list.innerHTML="";

cart.forEach((item,index)=>{

let li=document.createElement("li");

li.innerHTML=item.qty+" x "+item.name+" - $"+item.subtotal+

" <button class='remove-btn' onclick='removeItem("+index+")'>❌</button>";

list.appendChild(li);

});

document.getElementById("total").innerText=total;

}

function sendWhatsApp(){

let message="🧾 Pedido El Rincon de la Mila%0A%0A";

cart.forEach(item=>{

message+=item.qty+" x "+item.name+" - $"+item.subtotal+"%0A";

});

message+="%0ATotal: $"+total;

window.open("https://wa.me/543624505931?text="+message);

}

function loadReviews(){

let reviews=JSON.parse(localStorage.getItem("reviews"))||[];

let container=document.getElementById("reviews");

container.innerHTML="";

reviews.forEach(r=>{

let div=document.createElement("div");

div.className="review";

div.innerHTML=`

<img src="https://i.pravatar.cc/100">

<h4>${r.name}</h4>

<div class="stars">${"★".repeat(r.rating)}</div>

<p>${r.comment}</p>

`;

container.appendChild(div);

});

}

function addReview(e){

e.preventDefault();

let name=document.getElementById("name").value;

let comment=document.getElementById("comment").value;

let rating=document.getElementById("rating").value;

let reviews=JSON.parse(localStorage.getItem("reviews"))||[];

reviews.push({name,comment,rating});

localStorage.setItem("reviews",JSON.stringify(reviews));

document.getElementById("name").value="";

document.getElementById("comment").value="";

loadReviews();

}

let scroll=0;

function autoCarousel(){

let container=document.querySelector(".reviews");

scroll+=320;

if(scroll>=container.scrollWidth){scroll=0;}

container.style.transform="translateX(-"+scroll+"px)";

}

setInterval(autoCarousel,3000);

let count=0;

let target=500;

let counter=document.getElementById("counter");

let interval=setInterval(()=>{

count+=5;

counter.innerText="+"+count;

if(count>=target){

counter.innerText="+500";

clearInterval(interval);

}

},20);

const toggleBtn=document.getElementById("darkToggle");

if(localStorage.getItem("darkMode")==="enabled"){

document.body.classList.add("dark");

}

toggleBtn.addEventListener("click",()=>{

document.body.classList.toggle("dark");

if(document.body.classList.contains("dark")){

localStorage.setItem("darkMode","enabled");

}else{

localStorage.setItem("darkMode","disabled");

}

});

loadReviews();

</script>

</body>
  </html>
