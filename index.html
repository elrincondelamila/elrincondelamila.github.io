<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>El Rincón de la Mila</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0f0f0f;
color:white;
}

header{
background:black;
padding:20px;
text-align:center;
font-size:24px;
border-bottom:2px solid #25D366;
}

/* CONTADOR */
.counter{
text-align:center;
padding:15px;
color:#25D366;
font-weight:bold;
}

/* PRODUCTO */
.container{
display:flex;
justify-content:center;
padding:20px;
}

.card{
background:#1a1a1a;
width:320px;
border-radius:15px;
padding:15px;
text-align:center;
box-shadow:0 5px 15px rgba(0,0,0,0.6);
}

.card img{
width:100%;
border-radius:10px;
}

.price{
color:#25D366;
font-size:22px;
font-weight:bold;
}

/* INPUTS */
input{
padding:8px;
border-radius:8px;
border:none;
margin:5px;
width:90%;
}

/* BOTONES */
button{
background:#25D366;
border:none;
padding:10px;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}

button:hover{
opacity:0.8;
}

/* CARRITO */
.cart{
background:#111;
padding:20px;
margin:20px;
border-radius:15px;
}

.cart-item{
display:flex;
justify-content:space-between;
margin:8px 0;
}

/* MAPA */
iframe{
width:90%;
height:250px;
border-radius:15px;
border:none;
}

/* WHATSAPP FLOTA */
.float{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
padding:15px;
border-radius:50%;
box-shadow:0 5px 10px black;
}

.float a{
text-decoration:none;
font-size:20px;
color:black;
}
</style>
</head>
<body>

<header>🍗 El Rincón de la Mila</header>

<div class="counter">
🔥 +500 Clientes Satisfechos
</div>

<div class="container">
<div class="card">
<img src="https://images.pexels.com/photos/461198/pexels-photo-461198.jpeg">
<h3>Milanesa de Peceto</h3>
<p class="price">$11.900</p>

<input type="text" id="clientName" placeholder="Tu Nombre">

<input type="number" id="quantity" placeholder="Cantidad" min="1" value="1">

<button onclick="addToCart()">Agregar al Carrito</button>
</div>
</div>

<!-- CARRITO -->
<div class="cart">
<h2>🛒 Carrito</h2>
<div id="cartItems"></div>
<h3>Total: $<span id="total">0</span></h3>

<button onclick="checkout()">🟢 Comprar Ahora</button>
</div>

<!-- MAPA -->
<center>
<h2>📍 Nuestra Ubicación</h2>
<iframe src="https://www.google.com/maps/embed?pb=!1m18"></iframe>
</center>

<div class="float">
<a href="https://wa.me/543624505931" target="_blank">💬</a>
</div>

<script>

let total = 0;

function addToCart(){

let name = document.getElementById("clientName").value;
let quantity = parseInt(document.getElementById("quantity").value);

if(name === ""){
alert("Escribe tu nombre");
return;
}

let price = 11900;
let cart = document.getElementById("cartItems");

let itemTotal = price * quantity;

let item = document.createElement("div");
item.classList.add("cart-item");
item.innerHTML = `
<span>${name} - ${quantity}x</span>
<span>$${itemTotal}</span>
<button onclick="removeItem(this, ${itemTotal})">❌</button>
`;

cart.appendChild(item);

total += itemTotal;
document.getElementById("total").innerText = total;
}

function removeItem(btn, itemTotal){
btn.parentElement.remove();
total -= itemTotal;
document.getElementById("total").innerText = total;
}

function checkout(){

let name = document.getElementById("clientName").value;
let items = document.querySelectorAll(".cart-item");

if(items.length === 0){
alert("Carrito vacío");
return;
}

let message = "Hola soy " + name + ", quiero comprar:\n\n";

items.forEach(item=>{
message += item.children[0].innerText + " - " + item.children[1].innerText + "\n";
});

message += "\nTotal: $" + total;

let url = "https://wa.me/543624505931?text=" + encodeURIComponent(message);

window.open(url, "_blank");
}

</script>

</body>
</html>
