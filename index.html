<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>El Rincón de la Mila</title>

<style>
body{
  margin:0;
  font-family: 'Segoe UI', sans-serif;
  background:#f4f4f4;
  color:#222;
}

header{
  background: linear-gradient(135deg,#d62828,#9d0208);
  color:white;
  padding:80px 20px;
  text-align:center;
}

h1{margin:0;font-size:42px;}

section{
  padding:60px 20px;
  max-width:1100px;
  margin:auto;
}

.card{
  background:white;
  padding:40px;
  border-radius:20px;
  box-shadow:0 15px 40px rgba(0,0,0,0.08);
  margin-bottom:40px;
}

h2{text-align:center;margin-bottom:30px;}

.counter{
  font-size:32px;
  text-align:center;
  color:#d62828;
  font-weight:bold;
}

/* PRODUCTOS */
.products{
  display:grid;
  grid-template-columns: repeat(auto-fit, minmax(250px,1fr));
  gap:30px;
}

.product{
  background:white;
  padding:20px;
  border-radius:15px;
  box-shadow:0 10px 25px rgba(0,0,0,0.08);
  text-align:center;
}

.product img{
  width:100%;
  border-radius:15px;
  margin-bottom:15px;
}

button{
  background:#d62828;
  color:white;
  border:none;
  padding:10px 20px;
  border-radius:8px;
  cursor:pointer;
}

button:hover{background:#9d0208;}

.cart{
  background:#111;
  color:white;
  padding:20px;
  border-radius:15px;
}

.whatsapp-float{
  position:fixed;
  width:60px;
  height:60px;
  bottom:25px;
  right:25px;
  background:#25D366;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:30px;
  text-decoration:none;
  color:white;
}

iframe{
  width:100%;
  height:400px;
  border:0;
  border-radius:20px;
}
</style>
</head>

<body>

<header>
<h1>El Rincón de la Mila</h1>
<p>Milanesas artesanales premium</p>
</header>

<section>

<div class="card">
<h2>+ Clientes Satisfechos</h2>
<div class="counter" id="counter">0</div>
</div>

<div class="card">
<h2>Nuestros Productos</h2>

<div class="products">

<div class="product">
<img src="https://tuusuario.github.io/nombre-repo/milanesapollo.jpg" width="300">
<h3>Milanesa de Pollo x 1kg</h3>
<p>$8.600</p>
<button onclick="addToCart('1kg',5600)">Agregar</button>
</div>

<div class="product">
<img src="https://images.unsplash.com/photo-1625948515291-69613efd103f" alt="">
<h3>Milanesa de Pollo x 3kg</h3>
<p>$7.000</p>
<button onclick="addToCart('3kg',7000)">Agregar</button>
</div>

</div>
</div>

<div class="card cart">
<h2>Carrito</h2>
<ul id="cart-list"></ul>
<p>Total: $<span id="total">0</span></p>
<button onclick="sendWhatsApp()">Finalizar Compra</button>
</div>

<h2>Ubicación</h2>
<iframe src="https://www.google.com/maps?q=Miguel%20Cane%202575,%20Barranqueras,%20Chaco&output=embed"></iframe>

</section>

<a href="https://wa.me/543624505931" class="whatsapp-float">💬</a>

<script>
let cart=[];
let total=0;

function addToCart(product,price){
  cart.push(product+" - $"+price);
  total+=price;
  document.getElementById("total").innerText=total;
  let li=document.createElement("li");
  li.innerText=product+" - $"+price;
  document.getElementById("cart-list").appendChild(li);
}

function sendWhatsApp(){
  let message="Hola! Quiero comprar:%0A"+cart.join("%0A")+"%0ATotal: $"+total;
  window.open("https://wa.me/543624505931?text="+message);
}

/* CONTADOR ANIMADO */
let count=0;
let target=500;
let counter=document.getElementById("counter");

let interval=setInterval(()=>{
  count+=5;
  counter.innerText="+"+count;
  if(count>=target){
    counter.innerText="+500";
    clearInterval(interval);
  }
},30);
</script>

</body>
</html>
