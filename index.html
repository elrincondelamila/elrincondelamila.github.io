<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>El Rincón de la Mila</title>

<meta name="theme-color" content="#d62828">

<link rel="manifest" href="manifest.json">

<style>

body{
margin:0;
font-family:Arial;
background:#f2f2f2;
}

/* HEADER */

header{
background:#d62828;
color:white;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

header img{
width:40px;
border-radius:10px;
}

.cart{
font-size:20px;
}

/* HERO */

.hero{
background:white;
padding:20px;
text-align:center;
}

.hero img{
width:100%;
border-radius:20px;
}

/* STATS */

.stats{
display:flex;
justify-content:space-around;
background:white;
padding:15px;
}

.stat{
text-align:center;
}

.stat h3{
margin:0;
color:#d62828;
}

/* BUSCADOR */

.search{
padding:15px;
background:white;
}

.search input{
width:100%;
padding:12px;
border-radius:10px;
border:1px solid #ddd;
}

/* PRODUCTOS */

.products{
padding:15px;
display:flex;
flex-direction:column;
gap:15px;
}

.product{
background:white;
border-radius:15px;
display:flex;
overflow:hidden;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.product img{
width:120px;
object-fit:cover;
}

.info{
padding:10px;
flex:1;
}

.price{
color:#d62828;
font-weight:bold;
font-size:18px;
}

.qty{
display:flex;
align-items:center;
gap:10px;
margin-top:5px;
}

.qty button{
background:#d62828;
color:white;
border:none;
width:30px;
height:30px;
border-radius:6px;
}

.add{
background:#25D366;
border:none;
padding:8px;
border-radius:8px;
color:white;
margin-top:8px;
width:100%;
}

/* CARRITO */

.cart-box{
position:fixed;
top:70px;
right:10px;
background:white;
padding:15px;
border-radius:15px;
box-shadow:0 5px 20px rgba(0,0,0,0.2);
width:220px;
max-height:300px;
overflow:auto;
}

.total{
font-weight:bold;
margin-top:10px;
}

/* REVIEWS */

.reviews{
background:white;
margin:15px;
padding:15px;
border-radius:15px;
}

.stars{
color:#ff9800;
}

/* FORM */

form input, form textarea{
width:100%;
padding:10px;
margin-top:10px;
border-radius:8px;
border:1px solid #ddd;
}

form button{
margin-top:10px;
background:#d62828;
color:white;
border:none;
padding:10px;
border-radius:8px;
width:100%;
}

/* NAVBAR */

.navbar{
position:fixed;
bottom:0;
width:100%;
background:white;
display:flex;
justify-content:space-around;
padding:10px;
box-shadow:0 -5px 15px rgba(0,0,0,0.1);
}

/* WHATSAPP */

.whatsapp{
position:fixed;
bottom:70px;
right:20px;
background:#25D366;
width:60px;
height:60px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
color:white;
text-decoration:none;
}

</style>

</head>

<body>

<header>

<img src="BackgroundEraser_20260304_034450533.png">

<b>El Rincón de la Mila</b>

<div class="cart">
🛒 <span id="count">0</span>
</div>

</header>

<div class="hero">

<img src="Milanesapollo.jpeg">

<h2>Milanesas artesanales de Barranqueras</h2>

</div>

<div class="stats">

<div class="stat">
<h3 id="visits">0</h3>
<p>Visitas</p>
</div>

<div class="stat">
<h3>⭐4.9</h3>
<p>Calificación</p>
</div>

<div class="stat">
<h3>+500</h3>
<p>Clientes</p>
</div>

</div>

<div class="search">
<input type="text" placeholder="Buscar producto..." onkeyup="searchProducts(this.value)">
</div>

<div class="products" id="products"></div>

<div class="cart-box">

<b>Tu pedido</b>

<div id="cart-items"></div>

<div class="total">
Total: $<span id="total">0</span>
</div>

<button onclick="sendOrder()">Enviar pedido</button>

</div>

<div class="reviews">

<h3>Opiniones</h3>

<div id="review-list"></div>

<h4>Dejar opinión</h4>

<form onsubmit="addReview(event)">

<input id="name" placeholder="Nombre">

<textarea id="comment" placeholder="Comentario"></textarea>

<button>Publicar</button>

</form>

</div>

<a href="https://wa.me/543624505931" class="whatsapp">💬</a>

<div class="navbar">

<div>🏠</div>
<div>🍗</div>
<div>⭐</div>
<div>📞</div>

</div>

<script>

/* PRODUCTOS */

let products=[
{name:"Milanesa 1kg",price:8000},
{name:"Milanesa 3kg",price:18000},
{name:"Milanesa 10kg",price:55000},
{name:"Milanesa 25kg",price:120000}
];

let cart={};

function renderProducts(list){

let html="";

list.forEach(p=>{

html+=`
<div class="product">

<img src="Milanesapollo.jpeg">

<div class="info">

<h3>${p.name}</h3>

<div class="price">$${p.price}</div>

<div class="qty">

<button onclick="changeQty('${p.name}',-1)">-</button>

<span id="q-${p.name}">0</span>

<button onclick="changeQty('${p.name}',1)">+</button>

</div>

<button class="add" onclick="addCart('${p.name}',${p.price})">Agregar</button>

</div>

</div>
`;

});

document.getElementById("products").innerHTML=html;

}

renderProducts(products);

function changeQty(name,val){

let el=document.getElementById("q-"+name);

let q=parseInt(el.innerText)+val;

if(q<0)q=0;

el.innerText=q;

}

function addCart(name,price){

let q=parseInt(document.getElementById("q-"+name).innerText);

if(q==0)return;

cart[name]=(cart[name]||0)+q;

renderCart();

document.getElementById("q-"+name).innerText=0;

}

function renderCart(){

let html="";
let total=0;

for(let p in cart){

let price=products.find(x=>x.name==p).price;
let q=cart[p];

total+=price*q;

html+=p+" x"+q+"<br>";

}

document.getElementById("cart-items").innerHTML=html;

document.getElementById("count").innerText=Object.keys(cart).length;

document.getElementById("total").innerText=total;

}

function sendOrder(){

let msg="Hola quiero pedir:%0A";

for(let p in cart){
msg+=p+" x"+cart[p]+"%0A";
}

msg+="Total: $"+document.getElementById("total").innerText;

window.open("https://wa.me/543624505931?text="+msg);

}

/* BUSCAR */

function searchProducts(text){

let f=products.filter(p=>p.name.toLowerCase().includes(text.toLowerCase()));

renderProducts(f);

}

/* VISITAS */

let v=localStorage.getItem("visits")||0;

v++;

localStorage.setItem("visits",v);

document.getElementById("visits").innerText=v;

/* REVIEWS */

function loadReviews(){

let r=JSON.parse(localStorage.getItem("reviews"))||[];

let html="";

r.forEach(x=>{
html+=`<p><b>${x.name}</b> ⭐⭐⭐⭐⭐<br>${x.comment}</p>`;
});

document.getElementById("review-list").innerHTML=html;

}

loadReviews();

function addReview(e){

e.preventDefault();

let name=document.getElementById("name").value;
let comment=document.getElementById("comment").value;

let r=JSON.parse(localStorage.getItem("reviews"))||[];

r.push({name,comment});

localStorage.setItem("reviews",JSON.stringify(r));

loadReviews();

}

/* APP INSTALABLE */

if ('serviceWorker' in navigator) {
navigator.serviceWorker.register('service-worker.js');
}

</script>

</body>
</html>
