<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>El Rincón de la Mila</title>

<style>

body{
margin:0;
font-family:Arial, sans-serif;
background:#fafafa;
color:#222;
transition:0.3s;
}

/* HEADER */

header{
background:linear-gradient(135deg,#ff9800,#ff6f00);
color:white;
padding:25px;
text-align:center;
position:sticky;
top:0;
z-index:1000;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

header h2{margin:0;}

.cart-counter{
position:absolute;
right:20px;
top:25px;
background:white;
color:#ff6f00;
padding:5px 10px;
border-radius:20px;
font-weight:bold;
}

.menu-btn{
position:absolute;
left:20px;
top:25px;
font-size:26px;
cursor:pointer;
}

/* MENU */

.menu{
position:fixed;
left:-260px;
top:0;
width:260px;
height:100%;
background:white;
padding:30px;
box-shadow:3px 0 15px rgba(0,0,0,0.2);
transition:0.3s;
z-index:2000;
}

.menu a{
display:block;
margin:20px 0;
text-decoration:none;
color:#ff6f00;
font-weight:bold;
}

.menu.active{
left:0;
}

/* HERO MEJORADO */

.hero{
position:relative;
background:url("Milanesapollo.jpeg") center/cover no-repeat;
height:300px;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
color:white;
padding:20px;
}

.hero::before{
content:"";
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
}

.hero h1,
.hero p{
position:relative;
z-index:1;
margin:5px 0;
}

.hero h1{
font-size:32px;
font-weight:bold;
}

.hero p{
font-size:18px;
}

/* CONTENEDOR */

.container{
max-width:1100px;
margin:auto;
padding:20px;
}

/* PRODUCTOS */

.productos{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(230px,1fr));
gap:20px;
}

.card{
background:white;
border-radius:15px;
padding:15px;
text-align:center;
box-shadow:0 5px 15px rgba(0,0,0,0.08);
transition:0.3s;
}

.card:hover{
transform:translateY(-6px);
}

.card img{
width:100%;
border-radius:12px;
}

/* BOTONES */

button{
background:#ff9800;
border:none;
color:white;
padding:10px 15px;
border-radius:20px;
cursor:pointer;
transition:0.3s;
}

button:hover{
opacity:0.8;
}

button:disabled{
background:gray;
cursor:not-allowed;
}

/* CARRITO */

.carrito{
background:white;
padding:20px;
border-radius:15px;
margin-top:40px;
box-shadow:0 5px 15px rgba(0,0,0,0.08);
}

/* RESEÑAS */

.reseñas{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:15px;
}

.reseña{
background:white;
padding:15px;
border-radius:15px;
box-shadow:0 4px 10px rgba(0,0,0,0.06);
}

/* FORM OPINION */

.form-reseña input,
.form-reseña textarea{
width:100%;
padding:8px;
margin:5px 0;
border-radius:10px;
border:1px solid #ccc;
}

/* WHATSAPP */

.whatsapp{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
color:white;
padding:15px;
border-radius:50%;
font-size:22px;
text-decoration:none;
}

/* FOOTER */

footer{
background:#111;
color:white;
text-align:center;
padding:30px;
margin-top:50px;
}

</style>
</head>
<body>

<div class="menu" id="menu">
<a href="#productos">Productos</a>
<a href="#opiniones">Opiniones</a>
<a href="#ubicacion">Ubicación</a>
</div>

<header>
<div class="menu-btn" onclick="toggleMenu()">☰</div>
<div class="cart-counter" id="contador">0</div>
<h2>El Rincón de la Mila</h2>
</header>

<!-- ESPACIO PARA QUE NO QUEDE PEGADO -->
<div style="height:10px;"></div>

<section class="hero">
<h1>Las milanesas más ricas</h1>
<p>Calidad y sabor directo a tu mesa</p>
</section>

<div class="container">

<h2 id="productos">Productos</h2>

<div class="productos">

<div class="card">
<img src="Milanesapollo.jpeg">
<h3>3kg</h3>
<p>$15000</p>
<button onclick="agregar('3kg',15000)">Agregar</button>
</div>

<div class="card">
<img src="Milanesapollo.jpeg">
<h3>5kg</h3>
<p>$24000</p>
<button onclick="agregar('5kg',24000)">Agregar</button>
</div>

<div class="card">
<img src="Milanesapollo.jpeg">
<h3>10kg</h3>
<p>$45000</p>
<button onclick="agregar('10kg',45000)">Agregar</button>
</div>

</div>

<div class="carrito">
<h2>Carrito</h2>
<ul id="lista"></ul>
<p>Total: <span id="total">$0</span></p>
<button onclick="finalizar()">Comprar por WhatsApp</button>
<button onclick="vaciar()">Vaciar</button>
</div>

<h2 id="opiniones">Opiniones</h2>

<div class="form-reseña">
<input id="nombre" placeholder="Tu nombre">
<textarea id="mensaje" placeholder="Tu opinión"></textarea>
<button onclick="agregarOpinion()">Enviar</button>
</div>

<div class="reseñas" id="reseñas"></div>

<h2 id="ubicacion">Ubicación</h2>

<iframe 
src="https://maps.google.com/maps?q=Miguel%20Cane%202575%20Barranqueras&t=&z=15&ie=UTF8&output=embed"
width="100%" height="300"
style="border:none;border-radius:15px;">
</iframe>

</div>

<a class="whatsapp" href="https://wa.me/543624505931">💬</a>

<footer>
<p>📍 Miguel Cane 2575 – Barranqueras</p>
<p>📞 3624 505931</p>
</footer>

<script>

let carrito=[];
let opiniones=JSON.parse(localStorage.getItem("opiniones"))||[];

/* MENU */

function toggleMenu(){
document.getElementById("menu").classList.toggle("active");
}

/* CARRITO */

function agregar(nombre,precio){
carrito.push({nombre,precio});
actualizar();
}

function actualizar(){
let lista=document.getElementById("lista");
lista.innerHTML="";
let total=0;

carrito.forEach((item,i)=>{
total+=item.precio;
let li=document.createElement("li");
li.innerHTML=item.nombre+" - $"+item.precio+
" <button onclick='eliminar("+i+")'>❌</button>";
lista.appendChild(li);
});

document.getElementById("total").textContent="$"+total;
document.getElementById("contador").textContent=carrito.length;
}

function eliminar(i){
carrito.splice(i,1);
actualizar();
}

function vaciar(){
carrito=[];
actualizar();
}

function finalizar(){
let msg="Hola quiero comprar:%0A";
carrito.forEach(item=>{
msg+="• "+item.nombre+"%0A";
});
window.open("https://wa.me/543624505931?text="+msg);
}

/* RESEÑAS */

function cargarOpiniones(){
let cont=document.getElementById("reseñas");
cont.innerHTML="";
opiniones.forEach(op=>{
let div=document.createElement("div");
div.className="reseña";
div.innerHTML="<strong>"+op.nombre+"</strong><p>"+op.msg+"</p>";
cont.appendChild(div);
});
}

function agregarOpinion(){
let nombre=document.getElementById("nombre").value;
let msg=document.getElementById("mensaje").value;

if(nombre && msg){
opiniones.push({nombre,msg});
localStorage.setItem("opiniones",JSON.stringify(opiniones));
cargarOpiniones();
}
}

cargarOpiniones();

</script>

</body>
</html>
